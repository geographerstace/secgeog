<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDB Tug-of-War: Housing Features</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #game-container {
            width: 90%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Tug of War Visuals */
        #tug-area {
            position: relative;
            height: 120px;
            margin: 40px 0;
            display: flex;
            align-items: center;
        }

        .team-box {
            width: 180px;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .left-box { background-color: #3498db; }
        .right-box { background-color: #27ae60; }

        #rope-track {
            flex-grow: 1;
            height: 12px;
            background: #dfe6e9;
            margin: 0 15px;
            position: relative;
            border-radius: 10px;
            border: 2px solid #b2bec3;
        }

        #marker {
            position: absolute;
            top: -25px;
            left: 50%;
            width: 50px;
            height: 60px;
            background-color: #e74c3c;
            border-radius: 8px;
            transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Input Controls */
        .controls {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 30px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
        }

        input { width: 300px; }

        button {
            background-color: #2d3436;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        /* The Dual Column Log */
        .log-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .log-column {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
        }

        .log-column h3 {
            margin-top: 0;
            font-size: 1em;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .entry {
            font-size: 0.85em;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            animation: fadeIn 0.4s ease;
        }

        .ben { background-color: #e8f8f5; border-left: 4px solid #2ecc71; }
        .cha { background-color: #fdf2f2; border-left: 4px solid #e74c3c; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>HDB Features Tug-of-War</h2>
        <p>Type a benefit or challenge and let the rope pull!</p>

        <div id="tug-area">
            <div class="team-box left-box">Inclusive Features</div>
            <div id="rope-track">
                <div id="marker">HDB</div>
            </div>
            <div class="team-box right-box">Environmental Features</div>
        </div>

        <div class="controls">
            <div class="input-row">
                <input type="text" id="feature-input" placeholder="type a benefit or challenge">
                <select id="type-select">
                    <option value="inc-ben">Inclusive Benefit</option>
                    <option value="inc-cha">Inclusive Challenge</option>
                    <option value="env-ben">Environmental Benefit</option>
                    <option value="env-cha">Environmental Challenge</option>
                </select>
                <button onclick="playTug()">Submit</button>
            </div>
        </div>

        <div class="log-grid">
            <div class="log-column" id="inc-log">
                <h3>Inclusive Log</h3>
                </div>
            <div class="log-column" id="env-log">
                <h3>Environmental Log</h3>
                </div>
        </div>
    </div>

    <script>
        let currentPos = 40;

        function playTug() {
            const input = document.getElementById('feature-input');
            const type = document.getElementById('type-select').value;
            const marker = document.getElementById('marker');
            
            if (!input.value.trim()) return;

            let direction = 0;
            let logTarget = "";
            let statusClass = "";
            let prefix = "";

            // LOGIC
            if (type === 'inc-ben') {
                direction = -10; // Pull Left
                logTarget = "inc-log";
                statusClass = "ben";
                prefix = "Benefit: ";
            } else if (type === 'inc-cha') {
                direction = 10; // Push Right
                logTarget = "inc-log";
                statusClass = "cha";
                prefix = "Challenge: ";
            } else if (type === 'env-ben') {
                direction = 10; // Pull Right
                logTarget = "env-log";
                statusClass = "ben";
                prefix = "Benefit: ";
            } else if (type === 'env-cha') {
                direction = -10; // Push Left
                logTarget = "env-log";
                statusClass = "cha";
                prefix = "Challenge: ";
            }

            // Update Position
            currentPos += direction;
            if (currentPos < 5) currentPos = 5;
            if (currentPos > 95) currentPos = 95;
            marker.style.left = currentPos + "%";

            // Add to Column Log
            const logDiv = document.getElementById(logTarget);
            const entry = document.createElement('div');
            entry.className = `entry ${statusClass}`;
            entry.innerHTML = `<strong>${prefix}</strong> ${input.value}`;
            logDiv.insertBefore(entry, logDiv.children[1]);

            // Reset
            input.value = "";
        }
    </script>
</body>
</html>
